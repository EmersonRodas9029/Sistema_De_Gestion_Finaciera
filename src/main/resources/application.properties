spring.application.name=sistema_gastos_clientes
server.port=${PORT:8080}

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:sistema_gastos_clientes}
spring.datasource.username=${DB_USERNAME:root}
# Sin default: debe venir de una variable de entorno real (ver .env.example). Antes tenía
# un password hardcodeado que quedó público en el historial del repo — ya no se repite ese error aquí.
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.thymeleaf.check-template-location=false

# Logging — solo errores del framework, INFO solo del proyecto
logging.level.root=WARN
logging.level.com.codepuppeteer=INFO
logging.level.org.springframework.boot.SpringApplication=WARN
logging.level.org.springframework.boot.StartupInfoLogger=WARN
logging.level.org.springframework.boot.web.embedded.tomcat=WARN
logging.level.org.hibernate.orm.deprecation=ERROR
logging.level.org.springframework.security=WARN
logging.pattern.console=%clr(%d{HH:mm:ss}){faint} %clr(%-5level){cyan} %msg%n

spring.flyway.enabled=true
spring.flyway.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:sistema_gastos_clientes}
spring.flyway.user=${DB_USERNAME:root}
spring.flyway.password=${DB_PASSWORD}

# JWT Configuration — sin default: JWT_SECRET debe ser una variable de entorno real (ver .env.example).
# El valor que estaba hardcodeado aquí quedó público en el historial del repo; ya fue rotado.
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Orígenes permitidos para CORS. En producción, sobreescribir con la URL real del frontend
# (ej. CORS_ALLOWED_ORIGINS=https://mi-app.vercel.app), separados por coma si hay varios.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}
