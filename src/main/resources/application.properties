# Server
server.port=8080
spring.application.name=sistema_gastos_clientes

# Datasource (MySQL en Docker mapeado a host:3307 -> container:3306)
spring.datasource.url=jdbc:mysql://localhost:3307/sistema_gastos_clientes_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=tu_usuario
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA - usamos Flyway para migraciones, por eso hibernate.ddl-auto=none
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Thymeleaf
spring.thymeleaf.cache=false

# Spring Security (ejemplo)
spring.security.user.name=admin
spring.security.user.password=changeme

# Springdoc
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
