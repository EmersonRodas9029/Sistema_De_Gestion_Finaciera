version: '3.9'
services:
  mysql:
    image: mysql:8.0
    container_name: sistema_gastos_clientes_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 12345
      MYSQL_DATABASE: sistema_gastos_clientes_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - sistema_gastos_network

volumes:
  mysql_data:

networks:
  sistema_gastos_network:
    driver: bridge
