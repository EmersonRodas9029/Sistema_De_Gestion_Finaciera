services:
  mysql:
    image: mysql:8.0
    container_name: sistema_gastos_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env (see .env.example)}
      MYSQL_DATABASE: ${DB_NAME:-sistema_gastos_clientes}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
