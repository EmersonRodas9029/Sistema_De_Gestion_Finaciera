version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: sgc_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sistema_gastos_clientes_db
      MYSQL_ROOT_PASSWORD: 1234456
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"

volumes:
  db_data:
