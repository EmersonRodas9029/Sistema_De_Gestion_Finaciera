version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_sistema_gastos
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 12345
      MYSQL_DATABASE: sistema_gastos_clientes
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
